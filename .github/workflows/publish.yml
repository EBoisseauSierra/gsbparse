name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs needs full history to infer version from tags
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run pytest
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CURRENT_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Generate release notes from conventional commits
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi
          DELIMITER=$(openssl rand -hex 16)
          {
            echo "notes<<${DELIMITER}"
            git log --pretty=format:"- %s" "$RANGE"
            echo ""
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: dist/*

  pypi-publish:
    needs: github-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
