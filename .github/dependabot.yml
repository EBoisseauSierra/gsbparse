version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # Bundle minor and patch bumps; major versions get individual PRs.
      python:
        update-types:
          - "minor"
          - "patch"
